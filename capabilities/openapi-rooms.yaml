naftiko: 1.0.0-alpha2
info:
  label: Google Nest Smart Device Management API — Rooms
  description: 'Google Nest Smart Device Management API — Rooms. 1 operations. Lead operation: Google Nest Smart Device Management
    List Rooms. Self-contained Naftiko capability covering one Google Nest business surface.'
  tags:
  - Google Nest
  - Rooms
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GOOGLE_NEST_API_KEY: GOOGLE_NEST_API_KEY
capability:
  consumes:
  - type: http
    namespace: openapi-rooms
    baseUri: https://smartdevicemanagement.googleapis.com/v1
    description: Google Nest Smart Device Management API — Rooms business capability. Self-contained, no shared references.
    resources:
    - name: enterprises-enterpriseId-structures-structureId-rooms
      path: /enterprises/{enterpriseId}/structures/{structureId}/rooms
      operations:
      - name: listrooms
        method: GET
        description: Google Nest Smart Device Management List Rooms
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: enterpriseId
          in: path
          type: string
          required: true
        - name: structureId
          in: path
          type: string
          required: true
  exposes:
  - type: rest
    namespace: openapi-rooms-rest
    port: 8080
    description: REST adapter for Google Nest Smart Device Management API — Rooms. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/enterprises/{enterpriseid}/structures/{structureid}/rooms
      name: enterprises-enterpriseid-structures-structureid-rooms
      description: REST surface for enterprises-enterpriseId-structures-structureId-rooms.
      operations:
      - method: GET
        name: listrooms
        description: Google Nest Smart Device Management List Rooms
        call: openapi-rooms.listrooms
        with:
          enterpriseId: rest.enterpriseId
          structureId: rest.structureId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: openapi-rooms-mcp
    port: 9090
    transport: http
    description: MCP adapter for Google Nest Smart Device Management API — Rooms. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: google-nest-smart-device-management
      description: Google Nest Smart Device Management List Rooms
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openapi-rooms.listrooms
      with:
        enterpriseId: tools.enterpriseId
        structureId: tools.structureId
      outputParameters:
      - type: object
        mapping: $.
